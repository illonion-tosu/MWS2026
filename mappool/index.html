<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappool</title>

    <!-- Styling -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main">
        <!-- Profile Pictures -->
        <div class="profile-picture left-profile-picture"></div>
        <div class="profile-picture right-profile-picture"></div>

        <!-- Player Names -->
        <div class="player-name left-player-name">thisisalongname</div>
        <div class="player-name right-player-name">thisisalongname</div>

        <!-- Player Scores -->
        <div class="player-score left-player-score">5</div>
        <div class="player-score right-player-score">3</div>

        <!-- Now Playing Stying -->
        <div class="now-playing">
            <div class="now-playing-background"></div>
            <div class="now-playing-overlay"></div>
            <section class="now-playing-stats">
                <div class="now-playing-stat-container">
                    <div class="now-playing-stat-text">SR</div>
                    <div class="now-playing-stat-number">7.43</div>
                </div>
                <div class="now-playing-stat-container">
                    <div class="now-playing-stat-text">BPM</div>
                    <div class="now-playing-stat-number">213</div>
                </div>
                <div class="now-playing-stat-container">
                    <div class="now-playing-stat-text">CS</div>
                    <div class="now-playing-stat-number">5.30</div>
                </div>
                <div class="now-playing-stat-container">
                    <div class="now-playing-stat-text">AR</div>
                    <div class="now-playing-stat-number">9.54</div>
                </div>
                <div class="now-playing-stat-container">
                    <div class="now-playing-stat-text">OD</div>
                    <div class="now-playing-stat-number">10.00</div>
                </div>
            </section>
            <div class="recipes left-recipes">
                <img src="static/recipes/recipe-1.png">
                <img src="static/recipes/recipe-2.png">
                <img src="static/recipes/recipe-3.png">
                <img src="static/recipes/recipe-4.png">
                <img src="static/recipes/recipe-5.png">
                <img src="static/recipes/recipe-6.png">
            </div>
            <div class="recipes right-recipes">
                <img src="static/recipes/recipe-1.png">
                <img src="static/recipes/recipe-2.png">
                <img src="static/recipes/recipe-3.png">
                <img src="static/recipes/recipe-4.png">
                <img src="static/recipes/recipe-5.png">
                <img src="static/recipes/recipe-6.png">
            </div>
        </div>
    </div>
</body>
</html>
